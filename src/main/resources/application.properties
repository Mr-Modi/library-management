spring.application.name=library-management

# H2 Database
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Async thread pool
app.async.core-pool-size=5
app.async.max-pool-size=20
app.async.queue-capacity=100
app.async.thread-name-prefix=LibraryAsync-

# Logging
logging.level.com.library=DEBUG

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=100